<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90% Board Prep - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --high: #fee2e2; --high-text: #991b1b;
            --med: #fef3c7; --med-text: #92400e;
            --low: #dcfce7; --low-text: #166534;
            --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 700px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .focus-section { background: linear-gradient(135deg, #4f46e5, #818cf8); color: white; }
        .focus-item { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        h1, h2 { margin: 0 0 10px 0; font-size: 1.3rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .goal-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .chart-container { height: 180px; width: 100%; margin-top: 10px; }
        .prio-high { background-color: var(--high); color: var(--high-text); border-left: 5px solid #ef4444; }
        .prio-med { background-color: var(--med); color: var(--med-text); border-left: 5px solid #f59e0b; }
        .prio-low { background-color: var(--low); color: var(--low-text); border-left: 5px solid #10b981; }
        input, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-small { width: auto; padding: 4px 10px; font-size: 0.75rem; }
        .task-item { display: flex; align-items: center; gap: 10px; padding: 12px; margin: 8px 0; border-radius: 8px; font-weight: 500; border: 1px solid #e2e8f0; }
        .rev-count { font-size: 0.75rem; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card focus-section">
        <h1>🎯 Today's Focus</h1>
        <div id="focusList"></div>
    </div>

    <div class="card">
        <div class="stats-grid">
            <div class="stat-box"><div id="dailyGoal" class="goal-num">0</div><small>Required Tasks/Day</small></div>
            <div class="stat-box"><div id="daysLeft" class="goal-num">0</div><small>Days Remaining</small></div>
        </div>
        <div class="chart-container"><canvas id="taskChart"></canvas></div>
        <div class="chart-container" style="margin-top: 30px;"><canvas id="revChart"></canvas></div>
    </div>

    <div class="card">
        <label>Board Exam Date:</label>
        <input type="date" id="examDateInput" onchange="save()">
        <input type="text" id="subInput" placeholder="Add Subject (e.g. Biology)">
        <button onclick="addSubject()">Add Subject</button>
        <button onclick="resetApp()" style="background:none; color:red; border:1px solid red; margin-top:10px;">Full Reset</button>
    </div>

    <div id="syllabusArea"></div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('studyUltimateData')) || { examDate: "", subjects: [] };
    let taskChart = null, revChart = null;

    function save() {
        appData.examDate = document.getElementById('examDateInput').value;
        localStorage.setItem('studyUltimateData', JSON.stringify(appData));
        render();
    }

    function resetApp() { if(confirm("Delete everything?")) { localStorage.clear(); location.reload(); } }

    function addSubject() {
        const name = document.getElementById('subInput').value;
        if (name) { appData.subjects.push({ name: name, tasks: [] }); document.getElementById('subInput').value = ''; save(); }
    }

    function addTask(sIdx) {
        const title = prompt("Topic Name:");
        const prio = prompt("Priority? (1=High, 2=Med, 3=Low)");
        if (title) {
            const priorityClass = prio === "1" ? "prio-high" : (prio === "2" ? "prio-med" : "prio-low");
            appData.subjects[sIdx].tasks.push({ title, done: false, priority: priorityClass, revs: 0, pinned: false });
            save();
        }
    }

    function toggleTask(sIdx, tIdx) { appData.subjects[sIdx].tasks[tIdx].done = !appData.subjects[sIdx].tasks[tIdx].done; save(); }
    function addRevision(sIdx, tIdx) { appData.subjects[sIdx].tasks[tIdx].revs++; save(); }
    function pinTask(sIdx, tIdx) { appData.subjects[sIdx].tasks[tIdx].pinned = !appData.subjects[sIdx].tasks[tIdx].pinned; save(); }

    function updateCharts() {
        const labels = appData.subjects.map(s => s.name);
        if (taskChart) taskChart.destroy();
        taskChart = new Chart(document.getElementById('taskChart'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Completed Topics', data: appData.subjects.map(s => s.tasks.filter(t => t.done).length), backgroundColor: '#4f46e5' }] },
            options: { maintainAspectRatio: false }
        });
        if (revChart) revChart.destroy();
        revChart = new Chart(document.getElementById('revChart'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Total Revisions', data: appData.subjects.map(s => s.tasks.reduce((a, b) => a + b
