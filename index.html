<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90% Board Prep - Topper Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 700px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .goal-num { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .task-item { display: flex; align-items: center; gap: 8px; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .rev-count { font-size: 0.8rem; background: #e0e7ff; padding: 2px 8px; border-radius: 10px; color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎯 Topper's Dashboard</h1>
        <div class="stats-grid">
            <div class="stat-box"><div id="dailyGoal" class="goal-num">0</div><small>Tasks/Day</small></div>
            <div class="stat-box"><div id="daysLeft" class="goal-num">0</div><small>Days Left</small></div>
        </div>
        <canvas id="myChart" height="150"></canvas>
    </div>

    <div class="card">
        <input type="date" id="examDateInput" onchange="save()">
        <input type="text" id="subInput" placeholder="New Subject...">
        <button onclick="addSubject()">Add Subject</button>
    </div>

    <div id="syllabusArea"></div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('topperData')) || { examDate: "", subjects: [] };
    let myChart = null;

    function save() {
        appData.examDate = document.getElementById('examDateInput').value;
        localStorage.setItem('topperData', JSON.stringify(appData));
        render();
    }

    function addSubject() {
        const name = document.getElementById('subInput').value;
        if (name) { appData.subjects.push({ name, tasks: [] }); document.getElementById('subInput').value = ''; save(); }
    }

    function addTask(sIdx) {
        const title = prompt("Topic Name:");
        if (title) { appData.subjects[sIdx].tasks.push({ title, revs: 0 }); save(); }
    }

    function addRevision(sIdx, tIdx) {
        appData.subjects[sIdx].tasks[tIdx].revs++;
        save();
    }

    function render() {
        document.getElementById('examDateInput').value = appData.examDate;
        const days = Math.ceil((new Date(appData.examDate) - new Date()) / (1000 * 60 * 60 * 24));
        document.getElementById('daysLeft').innerText = days > 0 ? days : 0;
        
        const area = document.getElementById('syllabusArea');
        area.innerHTML = '';
        appData.subjects.forEach((sub, sIdx) => {
            area.innerHTML += `<div class="card"><h2>${sub.name}</h2><button onclick="addTask(${sIdx})">+ Topic</button>
                ${sub.tasks.map((t, tIdx) => `
                    <div class="task-item">
                        <span style="flex:1">${t.title}</span>
                        <span class="rev-count">Revs: ${t.revs}</span>
                        <button onclick="addRevision(${sIdx}, ${tIdx})">Revise</button>
                    </div>`).join('')}</div>`;
        });
        updateCharts();
    }

    function updateCharts() {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: appData.subjects.map(s => s.name), 
                datasets: [{ label: 'Total Revisions', data: appData.subjects.map(s => s.tasks.reduce((a, b) => a + b.revs, 0)), backgroundColor: '#4f46e5' }] 
            }
        });
    }

    render();
</script>
</body>
</html>
