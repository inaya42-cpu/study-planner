<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90% Board Prep - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 700px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .goal-num { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        input, button { padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; width: 100%; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; }
        .task-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="stats-grid">
            <div class="stat-box"><div id="dailyGoal" class="goal-num">0</div><small>Tasks/Day</small></div>
            <div class="stat-box"><div id="daysLeft" class="goal-num">0</div><small>Days Left</small></div>
        </div>
        <canvas id="taskChart"></canvas>
    </div>

    <div class="card">
        <input type="date" id="examDate">
        <input type="text" id="subInput" placeholder="Add Subject...">
        <button id="addSubjectBtn">Add Subject</button>
        <button id="resetBtn" style="background: #ef4444;">Full Reset</button>
    </div>

    <div id="syllabusArea"></div>
</div>

<script>
    let appData = JSON.parse(localStorage.getItem('plannerData')) || { examDate: "", subjects: [] };

    function saveData() {
        appData.examDate = document.getElementById('examDate').value;
        localStorage.setItem('plannerData', JSON.stringify(appData));
        render();
    }

    document.getElementById('addSubjectBtn').addEventListener('click', () => {
        const name = document.getElementById('subInput').value;
        if(name) { appData.subjects.push({ name, tasks: [] }); document.getElementById('subInput').value = ''; saveData(); }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        if(confirm("Clear all data?")) { localStorage.clear(); location.reload(); }
    });

    document.getElementById('examDate').addEventListener('change', saveData);

    function render() {
        document.getElementById('examDate').value = appData.examDate;
        const days = Math.ceil((new Date(appData.examDate) - new Date()) / 86400000);
        document.getElementById('daysLeft').innerText = days > 0 ? days : 0;
        
        const area = document.getElementById('syllabusArea');
        area.innerHTML = '';
        appData.subjects.forEach((sub, sIdx) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<h3>${sub.name}</h3>`;
            const btn = document.createElement('button');
            btn.innerText = "+ Topic";
            btn.onclick = () => {
                const t = prompt("Topic Name:");
                if(t) { sub.tasks.push({ title: t, done: false }); saveData(); }
            };
            div.appendChild(btn);
            sub.tasks.forEach(t => {
                div.innerHTML += `<div class="task-item"><input type="checkbox" ${t.done ? 'checked' : ''}> <span>${t.title}</span></div>`;
            });
            area.appendChild(div);
        });
    }
    render();
</script>
</body>
</html>
