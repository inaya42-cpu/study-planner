<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90% Board Prep - Ultimate Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --high: #fee2e2; --high-text: #991b1b;
            --med: #fef3c7; --med-text: #92400e;
            --low: #dcfce7; --low-text: #166534;
            --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1e293b; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 700px; width: 100%; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        
        /* Focus Section */
        .focus-section { background: linear-gradient(135deg, #4f46e5, #818cf8); color: white; }
        .focus-item { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }

        h1, h2 { margin: 0 0 10px 0; font-size: 1.3rem; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 10px; }
        .stat-box { background: #f1f5f9; padding: 15px; border-radius: 12px; text-align: center; }
        .goal-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); }

        /* Priority Colors */
        .prio-high { background-color: var(--high); color: var(--high-text); border-left: 5px solid #ef4444; }
        .prio-med { background-color: var(--med); color: var(--med-text); border-left: 5px solid #f59e0b; }
        .prio-low { background-color: var(--low); color: var(--low-text); border-left: 5px solid #10b981; }

        input, select, button { padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #cbd5e1; width: 100%; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-small { width: auto; padding: 4px 10px; font-size: 0.75rem; }
        .task-item { display: flex; align-items: center; gap: 10px; padding: 10px; margin: 8px 0; border-radius: 8px; font-weight: 500; transition: 0.2s; }
        .chart-container { height: 200px; width: 100%; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Daily Focus Tracker -->
    <div class="card focus-section">
        <h1>🎯 Today's Focus</h1>
        <div id="focusList">
            <p style="font-size: 0.9rem; opacity: 0.9;">No topics pinned for today. Add one from your subjects below!</p>
        </div>
        <div id="dailyProgress" style="margin-top: 10px; font-size: 0.8rem;"></div>
    </div>

    <!-- 2. The Smart Dashboard -->
    <div class="card">
        <div class="stats-grid">
            <div class="stat-box">
                <div id="dailyGoal" class="goal-num">0</div>
                <small>Required Tasks/Day</small>
            </div>
            <div class="stat-box">
                <div id="daysLeft" class="goal-num" style="color: #64748b;">0</div>
                <small>Days Remaining</small>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <!-- 3. Setup -->
    <div class="card">
        <details>
            <summary style="cursor: pointer; font-weight: bold;">⚙️ App Settings & New Subjects</summary>
            <div style="margin-top:15px;">
                <label>Board Exam Date:</label>
                <input type="date" id="examDateInput" onchange="save()">
                <input type="text" id="subInput" placeholder="Add Subject (e.g. Biology)">
                <button onclick="addSubject()">Add Subject</button>
                <button onclick="resetApp()" style="background:none; color:red; border:1px solid red; margin-top:10px;">Full Reset</button>
            </div>
        </details>
    </div>

    <!-- 4. Syllabus with Priority -->
    <div id="syllabusArea"></div>
</div>

<script>
    let appData = {
        examDate: "",
        subjects: [], // {name, tasks: [{title, done, priority, pinned}]}
    };

    let myChart = null;

    function load() {
        const data = localStorage.getItem('studyUltimateData');
        if (data) { appData = JSON.parse(data); document.getElementById('examDateInput').value = appData.examDate; }
        render();
    }

    function save() {
        appData.examDate = document.getElementById('examDateInput').value;
        localStorage.setItem('studyUltimateData', JSON.stringify(appData));
        render();
    }

    function resetApp() {
        if(confirm("Delete everything?")) { localStorage.clear(); location.reload(); }
    }

    function addSubject() {
        const name = document.getElementById('subInput').value;
        if (name) { appData.subjects.push({ name: name, tasks: [] }); document.getElementById('subInput').value = ''; save(); }
    }

    function addTask(sIdx) {
        const title = prompt("Topic Name:");
        const prio = prompt("Priority? (1 for High, 2 for Med, 3 for Low)");
        if (title) {
            const priorityClass = prio === "1" ? "prio-high" : (prio === "2" ? "prio-med" : "prio-low");
            appData.subjects[sIdx].tasks.push({ title, done: false, priority: priorityClass, pinned: false });
            save();
        }
    }

    function toggleTask(sIdx, tIdx) {
        appData.subjects[sIdx].tasks[tIdx].done = !appData.subjects[sIdx].tasks[tIdx].done;
        save();
    }

    function pinTask(sIdx, tIdx) {
        appData.subjects[sIdx].tasks[tIdx].pinned = !appData.subjects[sIdx].tasks[tIdx].pinned;
        save();
    }

    function updateCharts() {
        const ctx = document.getElementById('myChart').getContext('2d');
        const labels = appData.subjects.map(s => s.name);
        const completed = appData.subjects.map(s => s.tasks.filter(t => t.done).length);
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Completed Topics', data: completed, backgroundColor: '#4f46e5' }]},
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: {stepSize: 1} } } }
        });
    }

    function render() {
        // Logic: Rescheduling
        const today = new Date();
        const exam = new Date(appData.examDate);
        const days = Math.ceil((exam - today) / (1000 * 60 * 60 * 24));
        document.getElementById('daysLeft').innerText = days > 0 ? days : 0;

        let totalLeft = 0;
        appData.subjects.forEach(s => totalLeft += s.tasks.filter(t => !t.done).length);
        document.getElementById('dailyGoal').innerText = (days > 0) ? (totalLeft / days).toFixed(1) : totalLeft;

        // Render Focus Area
        const focusArea = document.getElementById('focusList');
        focusArea.innerHTML = '';
        appData.subjects.forEach((s, sIdx) => {
            s.tasks.forEach((t, tIdx) => {
                if(t.pinned && !t.done) {
                    focusArea.innerHTML += `
                        <div class="focus-item">
                            <span><b>${s.name}</b>: ${t.title}</span>
                            <button class="btn-small" onclick="toggleTask(${sIdx}, ${tIdx})">Done</button>
                        </div>`;
                }
            });
        });

        // Render Syllabus Area
        const area = document.getElementById('syllabusArea');
        area.innerHTML = '';
        appData.subjects.forEach((sub, sIdx) => {
            area.innerHTML += `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="color:var(--primary)">${sub.name}</h2>
                        <button class="btn-small" onclick="addTask(${sIdx})">+ Add Topic</button>
                    </div>
                    <div>
                        ${sub.tasks.map((t, tIdx) => `
                            <div class="task-item ${t.priority}">
                                <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${sIdx}, ${tIdx})">
                                <span style="flex:1; ${t.done ? 'text-decoration:line-through; opacity:0.6' : ''}">${t.title}</span>
                                <button class="btn-small" style="background:#64748b" onclick="pinTask(${sIdx}, ${tIdx})">
                                    ${t.pinned ? '📍 Unpin' : '📌 Focus'}
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        updateCharts();
    }

    load();
</script>
</body>
</html>
